<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .task-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid #e9ecef;
        }
        .task-card:last-child {
            margin-bottom: 0;
        }
        .task-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        .task-desc {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            min-width: 120px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .btn:active {
            transform: translateY(0);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .btn.loading::after {
            content: '';
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            margin-left: 8px;
            animation: spin 1s linear infinite;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">&larr; 返回监控首页</a>
        <h1>定时任务管理</h1>
        <p class="subtitle">手动触发 java-backend 的定时任务</p>

        <div class="task-card">
            <div class="task-title">账单生成任务</div>
            <div class="task-desc">为所有活跃租约生成月度账单</div>
            <button class="btn" onclick="triggerTask('generate-bills', this)">立即执行</button>
        </div>

        <div class="task-card">
            <div class="task-title">逾期账单更新任务</div>
            <div class="task-desc">更新所有未支付账单的逾期状态和罚金</div>
            <button class="btn" onclick="triggerTask('update-overdue-bills', this)">立即执行</button>
        </div>

        <div id="message" class="message"></div>
    </div>

    <script>
        function triggerTask(taskName, btn) {
            btn.disabled = true;
            btn.classList.add('loading');
            btn.textContent = '执行中';

            const messageEl = document.getElementById('message');
            messageEl.style.display = 'none';

            fetch('/tasks/' + taskName, {
                method: 'GET'
            })
            .then(response => response.json())
            .then(data => {
                messageEl.textContent = data.message || (data.success ? '任务执行成功' : '任务执行失败');
                messageEl.className = 'message ' + (data.success ? 'success' : 'error');
                messageEl.style.display = 'block';
            })
            .catch(error => {
                messageEl.textContent = '调用失败: ' + error.message;
                messageEl.className = 'message error';
                messageEl.style.display = 'block';
            })
            .finally(() => {
                btn.disabled = false;
                btn.classList.remove('loading');
                btn.textContent = '立即执行';
            });
        }
    </script>
</body>
</html>
