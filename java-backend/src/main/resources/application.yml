spring:
  application:
    name: rental-management

  datasource:
    url: jdbc:mysql://mysql:3306/rental_management?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  mail:
    host: smtp.qq.com
    port: 587
    username: ${MAIL_USERNAME:your_email@qq.com}
    password: ${MAIL_PASSWORD:your_app_password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

  boot:
    admin:
      client:
        url: http://localhost:8081
        instance:
          prefer-ip: true
        management:
          base-url: http://localhost:8080/api

server:
  port: 8080
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health,info,scheduledtasks,beans,caches,conditions,configprops,env,loggers,metrics
  endpoint:
    health:
      show-details: always
    scheduledtasks:
      show-details: always

jwt:
  secret: YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXoxMjM0NTY3ODkwYWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXo
  expiration: 604800000

file:
  upload-dir: ./uploads

pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true
  params: count=countSql

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.rental.entity
logging:
  # 日志文件名
  file:
    name: /app/logs/springboot.log

  # 控制台 + 文件格式
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"

  # 滚动切分规则（关键）
  logback:
    rollingpolicy:
      # 按天 + 序号切分
      file-name-pattern: /app/logs/springboot-%d{yyyy-MM-dd}-%i.log
      # 单个文件最大大小
      max-file-size: 100MB
      # 最多保留多少天日志
      max-history: 30
      # 所有日志总大小上限
      total-size-cap: 5GB
      # 启动时清空历史日志（不需要可删）
      clean-history-on-start: false

  # 日志级别
  level:
    root: info
    com.rental: info